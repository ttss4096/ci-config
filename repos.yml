repos:
  - name: "craft-engine"
    url: https://gh.ttss4096.com/Xiao-MoMi/craft-engine.git
    branch: dev
    jdk: jdk21
    build_cmd: "./gradlew -Dorg.gradle.internal.http.connectionTimeout=300000 -Dorg.gradle.internal.http.socketTimeout=300000 -I legacy-bridge.gradle :bukkit:paper-loader:shadowJar --build-cache --parallel"
    artifact_patterns:
      - "target/*.jar"
    patches:
      - patches/craft-engine/0001-legacy-custom-block-item-api.patch
      - patches/craft-engine/0002-legacy-craftengine-items-bytecode-bridge.patch
      - patches/craft-engine/0003-update-check-modrinth-link.patch
      - patches/craft-engine/0004-fix-gradle-download-speed.patch
      - patches/craft-engine/0005-add-aliyun-mirror.patch